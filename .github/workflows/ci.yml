name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package_desktop:
        description: Build an unpacked macOS desktop app for release-candidate validation
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  checks:
    name: Lint, build, and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install backend smoke dependencies
        run: python -m pip install fastapi pydantic python-multipart requests

      - name: Lint frontend
        run: npm run lint

      - name: Test clip draft workflow
        run: npm run test:clip-drafts --prefix frontend

      - name: Test transcript selection workflow
        run: npm run test:transcript-selection --prefix frontend

      - name: Test transcript search workflow
        run: npm run test:transcript-search --prefix frontend

      - name: Test speaker stats workflow
        run: npm run test:speaker-stats --prefix frontend

      - name: Test caption designer workflow
        run: npm run test:caption-designer --prefix frontend

      - name: Test social publishing workflow
        run: npm run test:social-publishing --prefix frontend

      - name: Test hook frame workflow
        run: npm run test:hook-frames --prefix frontend

      - name: Test playback sync workflow
        run: npm run test:playback-sync --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Run backend smoke tests
        run: npm run smoke:backend

      - name: Compile backend
        run: python -m compileall -q backend

  package-desktop:
    name: Package macOS desktop app
    if: github.event_name == 'workflow_dispatch' && inputs.package_desktop
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build unpacked desktop app
        run: npm run dist:dir
